$kind: http-request
name: Create Meme
method: POST
url: '{{baseUrl}}/api/memes'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "imageUrl": "https://cdn.example.com/meme.jpg",
      "title": "Pondělní mém",
      "categoryId": 2,
      "tags": { "škola": true, "pondělí": true }
    }
description: '🔒 Login. Vytvoření nového méma. Pouze imageUrl je povinné. Response 201.'
